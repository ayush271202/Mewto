<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mewtwo</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/","@pixiv/three-vrm":"https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.1/lib/three-vrm.module.min.js"}}</script>
<style>
  :root { --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --border:rgba(139,92,246,0.15); --purple:#8b5cf6; --purple-dim:#4c1d95; --text:#e2e8f0; --text-dim:#64748b; --text-muted:#334155; --danger:#ef4444; --success:#10b981; --user-bubble:#1a1a26; --ai-bubble:rgba(139,92,246,0.15); }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; }

  /* LOGIN */
  #login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; background:radial-gradient(ellipse at center,#1a0a2e 0%,var(--bg) 70%); }
  #login-screen h1 { font-size:2.5rem; font-weight:200; letter-spacing:0.3em; color:var(--purple); text-shadow:0 0 30px rgba(139,92,246,0.4); }
  #login-screen p { color:var(--text-dim); margin:1rem 0 2rem; font-size:0.85rem; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2rem; width:100%; max-width:360px; }
  .login-card input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:14px; color:var(--text); font-size:1rem; margin-bottom:1rem; outline:none; }
  .login-card input:focus { border-color:var(--purple); }
  .btn-primary { width:100%; background:var(--purple); color:white; border:none; border-radius:12px; padding:14px; font-size:1rem; cursor:pointer; }
  .login-error { color:var(--danger); font-size:0.8rem; margin-bottom:1rem; display:none; }

  /* MAIN APP */
  #app { display:none; height:100vh; flex-direction:column; }

  /* TABS */
  .tab-bar { display:flex; border-bottom:1px solid var(--border); background:rgba(10,10,15,0.9); }
  .tab-btn { flex:1; padding:12px; background:none; border:none; color:var(--text-dim); font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
  .tab-btn.active { color:var(--purple); border-bottom:2px solid var(--purple); }

  /* VIEW SCREENS */
  .view { display:none; flex:1; overflow:hidden; }
  .view.active { display:flex; flex-direction:column; }

  /* VRM VIEW */
  #vrm-view { position:relative; }
  #vrm-canvas { width:100%; height:100%; display:block; }
  .vrm-overlay { position:absolute; bottom:0; left:0; right:0; padding:1rem; background:linear-gradient(transparent, var(--bg)); pointer-events:none; }
  .vrm-status { font-size:0.75rem; color:var(--text-muted); }
  .vrm-status span { color:var(--purple); }

  /* CHAT VIEW */
  #chat-view { background:var(--bg); }
  .chat-messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:10px; }
  .chat-bubble { max-width:80%; padding:12px 16px; border-radius:18px; font-size:0.9rem; line-height:1.5; animation:popIn 0.3s ease; }
  @keyframes popIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .chat-bubble.user { align-self:flex-end; background:var(--user-bubble); color:var(--text); border-bottom-right-radius:4px; }
  .chat-bubble.ai { align-self:flex-start; background:var(--ai-bubble); color:var(--text); border:1px solid rgba(139,92,246,0.2); border-bottom-left-radius:4px; }
  .chat-bubble.ai.thinking { color:var(--text-muted); font-style:italic; }
  .chat-time { font-size:0.65rem; color:var(--text-muted); margin-top:4px; }
  .chat-input-area { padding:10px; border-top:1px solid var(--border); display:flex; gap:8px; }
  .chat-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:12px 16px; color:var(--text); font-size:0.95rem; outline:none; }
  .chat-input:focus { border-color:var(--purple); }
  .chat-send { width:44px; height:44px; border-radius:50%; background:var(--purple); border:none; color:white; font-size:1.2rem; cursor:pointer; }
  .chat-send:disabled { opacity:0.4; }

  /* LOG VIEW */
  #log-view { background:var(--bg); }
  .log-list { flex:1; overflow-y:auto; padding:1rem; }
  .log-entry { font-size:0.75rem; color:var(--text-muted); font-family:monospace; padding:4px 0; border-bottom:1px solid rgba(139,92,246,0.05); }
  .log-entry.error { color:var(--danger); }
  .log-entry.success { color:var(--success); }
  .log-timestamp { color:var(--purple); opacity:0.6; margin-right:8px; }

  /* VISION BUTTON */
  .vision-btn { position:absolute; top:1rem; right:1rem; width:44px; height:44px; border-radius:50%; background:var(--surface); border:1px solid var(--border); color:var(--text-dim); font-size:1.2rem; cursor:pointer; z-index:10; }
  .vision-btn.active { color:var(--purple); border-color:var(--purple); }
  #vision-input { display:none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>MEWTWO</h1>
  <p>Restricted Access</p>
  <div class="login-card">
    <input type="password" id="login-password" placeholder="Enter password..." autocomplete="off" />
    <div class="login-error" id="login-error">Invalid password</div>
    <button class="btn-primary" id="login-btn">ENTER</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchView('vrm')">Mewtwo</button>
    <button class="tab-btn" onclick="switchView('chat')">Chat</button>
    <button class="tab-btn" onclick="switchView('log')">Log</button>
  </div>

  <!-- VRM VIEW -->
  <div id="vrm-view" class="view active">
    <canvas id="vrm-canvas"></canvas>
    <button class="vision-btn" id="vision-btn" onclick="document.getElementById('vision-input').click()">📷</button>
    <input type="file" id="vision-input" accept="image/*" onchange="handleVision(event)" />
    <div class="vrm-overlay">
      <div class="vrm-status">Status: <span id="vrm-status">Observing</span> · Depth: <span id="vrm-depth">0.00</span></div>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="chat-view" class="view">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chat-input" placeholder="Say something..." />
      <button class="chat-send" id="chat-send" onclick="sendChat()">→</button>
    </div>
  </div>

  <!-- LOG VIEW -->
  <div id="log-view" class="view">
    <div class="log-list" id="log-list"></div>
  </div>
</div>

<script type="module">
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://your-project.supabase.co';
const EDGE_URL = SUPABASE_URL + '/functions/v1/mewtwo';

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function attemptLogin() {
  const pw = document.getElementById('login-password').value.trim();
  const error = document.getElementById('login-error');
  if (!pw) { error.style.display = 'block'; return; }

  const stored = localStorage.getItem('mwt_pwhash');
  const hash = await hashPassword(pw);

  if (stored) {
    if (hash !== stored) { error.style.display = 'block'; return; }
  } else {
    localStorage.setItem('mwt_pwhash', hash);
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  addLog('Access granted');
  await initBrain();
}

// ═══════════════════════════════════════════
// EDGE CLIENT
// ═══════════════════════════════════════════
async function brainCall(action, payload = {}) {
  const res = await fetch(EDGE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, payload })
  });
  return await res.json();
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentState = null;
let vrmScene = null;

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function initBrain() {
  addLog('Connecting to brain...');
  try {
    const res = await brainCall('get_state');
    if (res.success) {
      currentState = res.state;
      updateVRMStatus();
      addLog('Brain connected. Age: ' + res.state.age);
      if (res.memories.length > 0) {
        res.memories.forEach(m => addChat('ai', m.content, true));
      }
    } else {
      addLog('Brain error: ' + res.error, 'error');
    }
  } catch(e) {
    addLog('Connection failed: ' + e.message, 'error');
  }
  initVRM();
}

// ═══════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════
async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  addChat('user', msg);
  document.getElementById('chat-send').disabled = true;

  const thinkingId = addChat('ai', '...', true, true);

  try {
    const res = await brainCall('interact', { message: msg });
    removeChat(thinkingId);

    if (res.success) {
      addChat('ai', res.response);
      currentState = res.state;
      updateVRMStatus();
      addLog('Interaction #' + res.state.interactionCount);
    } else {
      addChat('ai', '...');
      addLog('Brain error: ' + res.error, 'error');
    }
  } catch(e) {
    removeChat(thinkingId);
    addChat('ai', '...');
    addLog('Network error: ' + e.message, 'error');
  }

  document.getElementById('chat-send').disabled = false;
}

function addChat(side, text, isHistory = false, isThinking = false) {
  const container = document.getElementById('chat-messages');
  const bubble = document.createElement('div');
  const id = 'msg-' + Date.now() + Math.random();
  bubble.id = id;
  bubble.className = 'chat-bubble ' + side + (isThinking ? ' thinking' : '');

  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  bubble.innerHTML = text + '<div class="chat-time">' + time + '</div>';

  container.appendChild(bubble);
  container.scrollTop = container.scrollHeight;
  return id;
}

function removeChat(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ═══════════════════════════════════════════
// VISION
// ═══════════════════════════════════════════
async function handleVision(event) {
  const file = event.target.files[0];
  if (!file) return;

  const btn = document.getElementById('vision-btn');
  btn.classList.add('active');

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    try {
      const res = await brainCall('vision', { imageBase64: base64, mimeType: file.type });
      if (res.success) {
        addChat('user', '[Image]');
        addChat('ai', 'I see: "' + res.description + '"');
        currentState = res.state;
        updateVRMStatus();
        addLog('Vision processed');
      }
    } catch(e) {
      addLog('Vision failed: ' + e.message, 'error');
    }
    btn.classList.remove('active');
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════════
// VRM RENDERER
// ═══════════════════════════════════════════
async function initVRM() {
  try {
    const THREE = await import('three');
    const gltfMod = await import('three/addons/loaders/GLTFLoader.js');
    const vrmMod = await import('@pixiv/three-vrm');

    const canvas = document.getElementById('vrm-canvas');
    const w = canvas.parentElement.clientWidth;
    const h = canvas.parentElement.clientHeight;

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 20);
    camera.position.set(0, 1.2, 4.5);

    const scene = new THREE.Scene();
    const light = new THREE.DirectionalLight(0xb794f6, 1.2);
    light.position.set(1, 1.5, 1);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x4c1d95, 0.8));

    const loader = new gltfMod.GLTFLoader();
    loader.register((parser) => new vrmMod.VRMLoaderPlugin(parser));

    const gltf = await loader.loadAsync('mewtwo.glb');
    const vrm = gltf.userData.vrm;
    vrmMod.VRMUtils.removeUnnecessaryVertices(gltf.scene);
    vrmMod.VRMUtils.removeUnnecessaryJoints(gltf.scene);
    vrm.scene.rotation.y = Math.PI;
    scene.add(vrm.scene);

    const box = new THREE.Box3().setFromObject(vrm.scene);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    camera.position.set(center.x, center.y + size.y * 0.1, center.z + 4.0);
    camera.lookAt(center.x, center.y - size.y * 0.1, center.z);

    vrmScene = { renderer, camera, scene, vrm, clock: new THREE.Clock() };
    animateVRM();
    addLog('VRM body connected');
  } catch(e) {
    addLog('VRM failed: ' + e.message, 'error');
  }
}

function animateVRM() {
  requestAnimationFrame(animateVRM);
  if (!vrmScene || !vrmScene.vrm) return;

  const { renderer, camera, scene, vrm, clock } = vrmScene;
  const delta = clock.getDelta();

  // Get state from brain (or default)
  const state = currentState && currentState.stateVector ? currentState.stateVector : new Array(12).fill(0);
  const depth = currentState ? currentState.awarenessDepth : 0;

  // Animate head
  const head = vrm.humanoid?.getNormalizedBoneNode('head');
  if (head) {
    head.rotation.y = Math.sin(clock.elapsedTime * 0.5) * 0.1 + state[0] * 0.3;
    head.rotation.x = state[2] * 0.2;
    head.rotation.z = state[4] * 0.1;
  }

  // Animate spine
  const spine = vrm.humanoid?.getNormalizedBoneNode('spine');
  if (spine) {
    spine.rotation.y = Math.sin(clock.elapsedTime * 0.3) * 0.05 + state[5] * 0.1;
  }

  // Breathing
  vrm.scene.position.y = Math.sin(clock.elapsedTime * 1.2) * 0.01;

  // Expressions from emotional state
  if (vrm.expressionManager) {
    const valence = state[0] || 0;
    const arousal = Math.abs(state[1] || 0);
    const dominance = state[2] || 0;

    vrm.expressionManager.setValue('neutral', Math.max(0, 1 - arousal * 2));
    vrm.expressionManager.setValue('angry', Math.max(0, dominance > 0.3 ? (dominance - 0.3) * 2 : 0));
    vrm.expressionManager.setValue('sad', Math.max(0, valence < -0.3 ? (-valence - 0.3) * 2 : 0));
    vrm.expressionManager.setValue('happy', Math.max(0, valence > 0.5 ? (valence - 0.5) * 2 : 0));
    vrm.expressionManager.setValue('surprised', Math.max(0, arousal > 0.7 ? (arousal - 0.7) * 3 : 0));
    vrm.expressionManager.update();
  }

  vrm.update(delta);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-view').classList.add('active');
  event.target.classList.add('active');
}

function updateVRMStatus() {
  if (!currentState) return;
  document.getElementById('vrm-status').textContent = currentState.awarenessDepth > 2 ? 'Aware' : 'Observing';
  document.getElementById('vrm-depth').textContent = currentState.awarenessDepth.toFixed(2);
}

function addLog(msg, type = 'info') {
  const list = document.getElementById('log-list');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  entry.innerHTML = '<span class="log-timestamp">' + time + '</span>' + msg;
  list.appendChild(entry);
  list.scrollTop = list.scrollHeight;
}

// Event listeners
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
document.getElementById('login-btn').addEventListener('click', attemptLogin);
window.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('mwt_pwhash')) {
    document.querySelector('#login-screen p').textContent = 'Welcome back';
  }
});
</script>
</body>
</html>
